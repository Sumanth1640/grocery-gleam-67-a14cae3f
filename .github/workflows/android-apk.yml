name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Create web assets shim
        run: |
          mkdir -p dist/client
          cat > dist/client/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>HalliFresh</title></head>
          <body>Loading…</body></html>
          HTML

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch MainActivity to allow UPI / intent:// schemes
        run: |
          PKG_DIR="android/app/src/main/java/app/lovable/hallifresh"
          mkdir -p "$PKG_DIR"
          cat > "$PKG_DIR/MainActivity.java" <<'JAVA'
          package app.lovable.hallifresh;

          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebViewClient;

          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              bridge.getWebView().setWebViewClient(new BridgeWebViewClient(bridge) {
                @Override
                public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                  String url = request.getUrl().toString();
                  if (handleExternal(url)) return true;
                  return super.shouldOverrideUrlLoading(view, request);
                }
                private boolean handleExternal(String url) {
                  if (url.startsWith("upi:") || url.startsWith("intent:") ||
                      url.startsWith("phonepe:") || url.startsWith("tez:") ||
                      url.startsWith("paytmmp:") || url.startsWith("gpay:") ||
                      url.startsWith("bhim:") || url.startsWith("credpay:") ||
                      url.startsWith("mailto:") || url.startsWith("tel:") ||
                      url.startsWith("sms:") || url.startsWith("whatsapp:")) {
                    try {
                      Intent intent;
                      if (url.startsWith("intent:")) {
                        intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                      } else {
                        intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      }
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                      return true;
                    } catch (Exception e) {
                      return false;
                    }
                  }
                  return false;
                }
              });
            }
          }
          JAVA
          echo "Patched MainActivity.java:"
          cat "$PKG_DIR/MainActivity.java"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hallifresh-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
