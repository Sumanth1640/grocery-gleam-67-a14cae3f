name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      - name: Strip dev server from capacitor.config (offline build)
        run: |
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('capacitor.config.ts', 'utf8');
          c = c.replace(/server:\s*{[\s\S]*?},\n/, '');
          fs.writeFileSync('capacitor.config.ts', c);
          console.log('Stripped server block');
          "

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hallifresh-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
