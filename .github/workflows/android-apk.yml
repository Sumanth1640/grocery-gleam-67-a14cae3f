name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Create hallifresh.in web assets shim
        run: |
          mkdir -p dist/client
          cat > dist/client/index.html <<'HTML'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=https://hallifresh.in/?native=1">
              <title>HalliFresh</title>
              <script>window.location.replace("https://hallifresh.in/?native=1")</script>
            </head>
            <body>Opening HalliFresh…</body>
          </html>
          HTML

      - name: Add Android platform
        run: |
          if [ ! -f "android/build.gradle" ]; then
            rm -rf android
            npx cap add android
          fi
          npx cap sync android
          test -f android/build.gradle && echo "android/build.gradle present" || (echo "ERROR: android/build.gradle missing after cap add" && ls -la android && exit 1)

      - name: Copy google-services.json into android/app
        run: |
          if [ -f google-services.json ]; then
            cp google-services.json android/app/google-services.json
          fi
          test -f android/app/google-services.json && echo "google-services.json present" || (echo "ERROR: missing google-services.json" && exit 1)

      - name: Enable Firebase / FCM in Gradle
        run: |
          ROOT="android/build.gradle"
          if ! grep -q "google-services" "$ROOT"; then
            python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/build.gradle")
          x = p.read_text()
          if "com.google.gms:google-services" not in x:
              x = re.sub(r"(dependencies\s*\{)",
                         r"\1\n        classpath 'com.google.gms:google-services:4.4.2'",
                         x, count=1)
              p.write_text(x)
              print("Added google-services classpath")
          PY
          fi
          APP="android/app/build.gradle"
          if ! grep -q "com.google.gms.google-services" "$APP"; then
            echo "" >> "$APP"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$APP"
          fi
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/build.gradle")
          x = p.read_text()
          if "firebase-messaging" not in x:
              x = re.sub(r"(dependencies\s*\{)",
                         r"\1\n    implementation platform('com.google.firebase:firebase-bom:33.5.1')\n    implementation 'com.google.firebase:firebase-messaging'",
                         x, count=1)
              p.write_text(x)
              print("Added Firebase messaging dependency")
          PY
          cat android/app/build.gradle | tail -20

      - name: Configure Android notification channel
        run: |
          python3 - <<'PY'
          import pathlib, re
          manifest = pathlib.Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          if 'com.google.firebase.messaging.default_notification_channel_id' not in text:
              text = text.replace(
                  '</application>',
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_channel_id" android:value="hallifresh-default" />\n</application>'
              )
          if 'com.google.firebase.messaging.default_notification_icon' not in text:
              text = text.replace(
                  '</application>',
                  '        <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@mipmap/ic_launcher" />\n</application>'
              )
          manifest.write_text(text)
          PY

      - name: Apply HalliFresh logo to Android splash and launcher icons
        run: |
          cat > apply-logo.mjs <<'NODE'
          import fs from 'fs/promises';
          import path from 'path';
          import sharp from 'sharp';


          const logo = path.resolve('public/hallifresh-logo.png');
          const res = path.resolve('android/app/src/main/res');
          const densities = {
            mdpi: 1,
            hdpi: 1.5,
            xhdpi: 2,
            xxhdpi: 3,
            xxxhdpi: 4,
          };

          async function writePng(target, width, height, logoSize, rounded = false) {
            await fs.mkdir(path.dirname(target), { recursive: true });
            const logoBuffer = await sharp(logo)
              .resize(Math.round(logoSize), Math.round(logoSize), { fit: 'contain' })
              .png()
              .toBuffer();
            let image = sharp({
              create: {
                width,
                height,
                channels: 4,
                background: '#ffffff',
              },
            }).composite([{ input: logoBuffer, gravity: 'center' }]);
            if (rounded) {
              const radius = Math.round(width * 0.22);
              const mask = Buffer.from(
                `<svg width="${width}" height="${height}"><rect width="${width}" height="${height}" rx="${radius}" ry="${radius}" fill="white"/></svg>`,
              );
              image = image.composite([{ input: mask, blend: 'dest-in' }]);
            }
            await image.png().toFile(target);
          }

          const splashSizes = [
            ['drawable/splash.png', 480, 320],
            ['drawable-land-mdpi/splash.png', 480, 320],
            ['drawable-land-hdpi/splash.png', 800, 480],
            ['drawable-land-xhdpi/splash.png', 1280, 720],
            ['drawable-land-xxhdpi/splash.png', 1600, 960],
            ['drawable-land-xxxhdpi/splash.png', 1920, 1280],
            ['drawable-port-mdpi/splash.png', 320, 480],
            ['drawable-port-hdpi/splash.png', 480, 800],
            ['drawable-port-xhdpi/splash.png', 720, 1280],
            ['drawable-port-xxhdpi/splash.png', 960, 1600],
            ['drawable-port-xxxhdpi/splash.png', 1280, 1920],
          ];

          for (const [rel, width, height] of splashSizes) {
            await writePng(path.join(res, rel), width, height, Math.min(width, height) * 0.46);
          }

          for (const [density, scale] of Object.entries(densities)) {
            const dir = path.join(res, `mipmap-${density}`);
            await writePng(path.join(dir, 'ic_launcher.png'), 48 * scale, 48 * scale, 38 * scale, true);
            await writePng(path.join(dir, 'ic_launcher_round.png'), 48 * scale, 48 * scale, 38 * scale, true);
            await writePng(path.join(dir, 'ic_launcher_foreground.png'), 108 * scale, 108 * scale, 72 * scale);
          }

          await fs.writeFile(
            path.join(res, 'values/ic_launcher_background.xml'),
            '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#FFFFFF</color>\n</resources>\n',
          );
          NODE
          npm install --no-save --no-audit --no-fund sharp
          node apply-logo.mjs
          rm -f apply-logo.mjs



      - name: Verify APK target website
        run: |
          test -f android/app/src/main/assets/capacitor.config.json
          cat android/app/src/main/assets/capacitor.config.json
          grep -q 'https://hallifresh.in/?native=1' android/app/src/main/assets/capacitor.config.json

      - name: Patch MainActivity to allow UPI / intent:// schemes
        run: |
          PKG_DIR="android/app/src/main/java/app/lovable/hallifresh"
          mkdir -p "$PKG_DIR"
          cat > "$PKG_DIR/MainActivity.java" <<'JAVA'
          package app.lovable.hallifresh;

          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebViewClient;

          public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              bridge.getWebView().setWebViewClient(new BridgeWebViewClient(bridge) {
                @Override
                public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                  String url = request.getUrl().toString();
                  if (handleExternal(url)) return true;
                  return super.shouldOverrideUrlLoading(view, request);
                }
                private boolean handleExternal(String url) {
                  if (url.startsWith("upi:") || url.startsWith("intent:") ||
                      url.startsWith("phonepe:") || url.startsWith("tez:") ||
                      url.startsWith("paytmmp:") || url.startsWith("gpay:") ||
                      url.startsWith("bhim:") || url.startsWith("credpay:") ||
                      url.startsWith("mailto:") || url.startsWith("tel:") ||
                      url.startsWith("sms:") || url.startsWith("whatsapp:")) {
                    try {
                      Intent intent;
                      if (url.startsWith("intent:")) {
                        intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                      } else {
                        intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      }
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                      return true;
                    } catch (Exception e) {
                      return false;
                    }
                  }
                  return false;
                }
              });
            }
          }
          JAVA
          echo "Patched MainActivity.java:"
          cat "$PKG_DIR/MainActivity.java"

      - name: Patch AndroidManifest to register hallifresh:// deep link
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          x = p.read_text()
          filter_block = (
              '\n            <intent-filter android:autoVerify="false">\n'
              '                <action android:name="android.intent.action.VIEW" />\n'
              '                <category android:name="android.intent.category.DEFAULT" />\n'
              '                <category android:name="android.intent.category.BROWSABLE" />\n'
              '                <data android:scheme="hallifresh" android:host="auth" />\n'
              '            </intent-filter>\n        '
          )
          if "android:scheme=\"hallifresh\"" not in x:
              # insert right before </activity> of MainActivity
              x = re.sub(
                  r'(<activity[^>]*android:name="\.MainActivity"[\s\S]*?)(</activity>)',
                  lambda m: m.group(1) + filter_block + m.group(2),
                  x, count=1,
              )
              p.write_text(x)
              print("Injected hallifresh:// intent-filter")
          else:
              print("Deep-link filter already present")
          PY
          cat "$MANIFEST"


      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hallifresh-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
